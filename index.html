<!DOCTYPE html>

        display: block;

</style>
</head>

<body>
    <section>   
        <nav>
            <div class="left-links">
                <a href="https://www.dailyuw.com/"><b>THE DAILY UW</b></a>
                <a href="https://www.dailyuw.com/page/about-us"><b>ABOUT US</b></a>
                <a href="./pages/staff.html"><b>STAFF</b></a>

    </section>
    <div class="login-box">
        <img src="./images/daily_sports_logo.jpg" alt="Daily Sports Logo" width="150" height="150" class="login-logo">
        <input type="text" placeholder="Username" name="username" required>
        <input type="password" placeholder="Password" name="password" required>
            <button onclick="netlifyIdentity.open()">LOGIN</button>
    </div>
        <div class = "bottom">
        <p>The Daily Sports 2026</p>
    </div>

    <script>
        const images = [
            './images/image1.webp',
            './images/image2.webp',
            './images/image3.webp',
            './images/image4.webp',
            './images/image5.webp',
            './images/image6.webp',
            './images/image7.webp'
        ];

        images.forEach((image) => {
            const img = new Image();
            img.src = image;
            });

        let currentIndex = 0;

        function changeBackground() {
            document.body.style.backgroundImage = `url('${images[currentIndex]}')`;

            currentIndex = (currentIndex + 1) % images.length;
        }

        setInterval(changeBackground, 5000); // Change every 5 seconds
        changeBackground(); // Initial call
    </script>

    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

    <script>
document.getElementById('loginBtn').addEventListener('click', async () => {
    const email = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    const response = await fetch('/.netlify/functions/login', {
        method: 'POST',
        body: JSON.stringify({ username, password }),
        headers: { 'Content-Type': 'application/json' }
    });

    const data = await response.json();

    if (data.success) {
        // Redirect to dashboard
        window.location.href = 'pages/dashboard/dashboard.html';
    } else {
        document.getElementById('loginError').innerText = data.message;
    }
});
</script>

<script>
  // Function to handle login action
  function loginUser() {
    const username = document.querySelector('input[name="username"]').value;
    const password = document.querySelector('input[name="password"]').value;

    // Assuming you're using Netlify Identity, initiate login here
    netlifyIdentity.login({ username, password })
      .then((user) => {
        // If login successful, redirect to the dashboard
        if (user) {
          window.location.href = "/dashboard.html"; // Redirect to dashboard
        } else {
          alert('Login failed! Please check your username/password.');
        }
      })
      .catch((error) => {
        console.error('Login error:', error);
        alert('An error occurred during login.');
      });
  }
</script>

</body>

</html>
