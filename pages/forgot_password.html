<!DOCTYPE html>
<html lang="en">
<title> Forgot Password - The Daily Sports</title>
<link rel="icon" type="image/x-icon" href="./favicon.ico?v=2">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<head>
    <style>
        body {
            background-image: url("./images/250219_JosephEsteban_MBBvIndiana-34.jpg");
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;
            background-color: #360f5a;
        }

        .forgot-box {
            display: flex;
            flex-direction: column;
            justify-content: center;
            background-color: white;
            font-family: 'Avenir Next', sans-serif;
            width: 300px;
            height: 300px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            margin-top: 100px;
            margin-left: auto;
            margin-right: auto;
            align-items: center;
        }

        .daily-logo {
            display: block;
            align-self: center;
            margin-top: 5px;
        }

        .forgot-box h3 {
            text-align: center;
            font-family: 'Avenir Next', sans-serif;
            font-size: 24px;
            color: #360f5a;
            margin-top: 10px;
            margin-left: 10px;
            margin-right: 10px;
            margin-bottom: 20px;
        }

        .forgot-box input[type="email"] {
            width: 80%;
            align-self: center;
            padding: 10px;
            margin-bottom: 20px;
            border: 2px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }

        .forgot-box button {
            width: 80%;
            height: 60px;
            align-self: center;
            background-color: #360f5a;
            color: white;
            font-family: "Avenir Next", sans-serif;
            font-size: 20px;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class = "forgot-box">
        <img src="./images/logo_daily_noback.png" alt="The Daily Sports Logo" width="250px" height="60px" class = "daily-logo">
        <h3>Reset Password</h3>
        <input type="email" id="email" name="email" placeholder="Enter your email">
        <button type="submit"><b>Send Reset Link</b></button>
    </div>
</body>
</html>
