<!DOCTYPE html>
<html lang="en">
<title> Dashboard - The Daily Sports</title>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/css/test2.css">
<link rel="icon" type="image/x-icon" href="./images/favicon.ico?v=2">
</head>
<meta charset="UTF-8">

<body>
<div class="page">

    <div class="account">
        <h6 id = "greetingHeader"></h6>
        <button id = "logout" class = "logout" onclick="logout()">Logout</button>
    </div>

    <div class="tab-container">
        <button class="tab-button" onclick="showTab(event, 'all-games')">All Scheduled</button> 
        <button class="tab-button" onclick="showTab(event, 'scheduled-games')">My Schedule</button>
        <button class="tab-button" onclick="showTab(event, 'available-games')">Available Games</button>
        <button class="tab-button" onclick="showTab(event, 'invoices')">Invoices</button>
        <button class="tab-button" onclick="showTab(event, 'history')">History</button>
        <button class="tab-button" onclick="showTab(event, 'settings')">Settings</button>
    </div>

    <div class="main">
    <div class="content">
    
    <div id = "all-games" class = "tab-content">
        <div id = "all-games-filter-container" class = "games-filter-container"></div>
        <div id = "all-games-container" class = "games-container"></div>
    </div>    

    <div id="scheduled-games" class="tab-content">
        <div id="scheduled-games-filter-container" class="games-filter-container"></div>       
        <div id = "scheduled-games-container" class = "games-container"></div>
    </div>

    <div id = "available-games" class="tab-content">
        <div id="available-games-filter-container" class="games-filter-container"></div>
        <div id = "available-games-container" class = "games-container"></div>
    </div>

    <div id="invoices" class="tab-content">
        <div class = "invoice-container">
            <div class = "invoice-history-container">
                <div class = "invoice-history-title">Invoice History</div>
                <div id = "invoice-entries-container" class = "invoice-entries-container">                                                                                                              
                </div>
            </div>

            <div class="invoice-options-container">
                <div class="invoice-option">
                    <a class="invoice-option-box" href="https://docs.google.com/spreadsheets/d/1Dq2EpVXIapIGQtLrrnhUTMovIyf2CjOqLjCmQtBYDfE/edit?gid=1394362240#gid=1394362240" target="_blank">
                    <img class="invoice-icon" src="/pages/dashboard/invoice/Spreadsheet.png" alt="Invoice 1">Invoice Template</a>
                </div>
                <div class="invoice-option">
                    <a class="invoice-option-box" href="https://docs.google.com/forms/d/e/1FAIpQLSd2SmGoedz4DyvqfMi69UCjnuZslxs0-WqRdL_7uLBIUHDgoQ/viewform" target="_blank">
                    <img class="invoice-icon" src="/pages/dashboard/invoice/Upload.png" alt="Invoice 1">Submit Invoice</a>
                </div>
                <div class="invoice-option">
                    <button class="invoice-option-box" onclick = "openInvoiceModal()">
                    <img class="invoice-icon" src="/pages/dashboard/invoice/History.png" alt="Invoice 1">Add to History</button>
                </div>
                <div class="invoice-option">
                    <a class="invoice-option-box" href="/pages/dashboard/invoice/Pay-Scale.png" target="_blank">
                    <img class="invoice-icon" src="/pages/dashboard/invoice/Pay.png" alt="Invoice 1">Pay Scale</a>
                </div>
            </div>
        </div>
    </div>

     <div id="history" class="tab-content">
        <div id = "history-filter-container" class = "history-filter-container"></div>
        <div id ="history-container" class = "games-container"></div>
    </div>

    <div id = "settings" class = "tab-content">
    </div>
    </div>


         <!-- CLOSE .content HERE -->

        <!-- Sidebar / Twitter feed -->
        <div class="links-container">
            <h4>Resources</h4>
            <a href="https://www.dailyuw.com/" target="_blank">The Daily UW</a>
            <a href="https://docs.google.com/document" target="_blank">Google Docs</a>
            <a href="https://docs.google.com/spreadsheets/d/1ReZfEgHbrBQnmULJR40Ko-4otU7xScpkCjUSmtFUXQI/edit?gid=1543249032#gid=1543249032" target="_blank">Production Schedule</a>
            <a href="https://statbroadcast.com/events/statmonitr.php?gid=wash" target="_blank">Stat Broadcast</a>
            <a href="https://x.com/UWDailySports" target="_blank">X</a>
            <a href="https://www.instagram.com/uwdailysports/" target="_blank">Instagram</a>
            <a href="https://docs.google.com/document/d/1AbVTnk5L6iNMqlh9C_b17tAvUl_IknHFXK7T5YS08dg/edit?tab=t.0" target="_blank">The Daily Handbook</a>
        </div>
    </div> <!-- CLOSE .main -->

    <div class="bottom">
        <p>The Daily Sports 2026</p>
    </div>

</div>

<template id="games-filter-template">
    <div class="games-filter">
        <div class="filter-section">
            <div class="filter-title">Sport</div>
            <div class="filter-options sport-options">
                <div class="filter-box" data-value="Football">FB</div>
                <div class="filter-box" data-value="Men's Soccer">MSOC</div>
                <div class="filter-box" data-value="Women's Soccer">WSOC</div>
                <div class="filter-box" data-value="Volleyball">VB</div>
                <div class="filter-box" data-value="Men's Golf">MGOLF</div>
                <div class="filter-box" data-value="Women's Golf">WGOLF</div>
                <div class="filter-box" data-value="Cross Country">CC</div>
                <div class="filter-box" data-value="Men's Basketball">MBB</div>
                <div class="filter-box" data-value="Women's Basketball">WBB</div>
                <div class="filter-box" data-value="Men's Tennis">MTEN</div>
                <div class="filter-box" data-value="Women's Tennis">WTEN</div>
                <div class="filter-box" data-value="Track & Field">TF</div>
                <div class="filter-box" data-value="Gymnastics">GYM</div>
                <div class="filter-box" data-value="Beach Volleyball">BVB</div>
                <div class="filter-box" data-value="Men's Rowing">MROW</div>
                <div class="filter-box" data-value="Women's Rowing">WROW</div>
                <div class="filter-box" data-value="Baseball">BSB</div>
                <div class="filter-box" data-value="Softball">SB</div>
              </div>
        </div>

        <div class="filter-section">
            <div class="filter-title">Location</div>
            <div class="filter-options location-options">
                <div class="filter-box" data-value="Home">Home</div>
                <div class="filter-box" data-value="Away">Away</div>
            </div>
        </div>
        <button class = "add-game" onclick = "openAddGameModal()"></button>
    </div>
</template>

<template id="history-filter-template">
    <div class="history-filter">
        <div class="filter-section">
            <div class="filter-title">Sport</div>
            <div class="history-sport-section sport-options">
                <div class="filter-box" data-value="Football">FB</div>
                <div class="filter-box" data-value="Men's Soccer">MSOC</div>
                <div class="filter-box" data-value="Women's Soccer">WSOC</div>
                <div class="filter-box" data-value="Volleyball">VB</div>
                <div class="filter-box" data-value="Men's Golf">MGOLF</div>
                <div class="filter-box" data-value="Women's Golf">WGOLF</div>
                <div class="filter-box" data-value="Cross Country">CC</div>
                <div class="filter-box" data-value="Men's Basketball">MBB</div>
                <div class="filter-box" data-value="Women's Basketball">WBB</div>
                <div class="filter-box" data-value="Men's Tennis">MTEN</div>
                <div class="filter-box" data-value="Women's Tennis">WTEN</div>
                <div class="filter-box" data-value="Track & Field">TF</div>
                <div class="filter-box" data-value="Gymnastics">GYM</div>
                <div class="filter-box" data-value="Beach Volleyball">BVB</div>
                <div class="filter-box" data-value="Men's Rowing">MROW</div>
                <div class="filter-box" data-value="Women's Rowing">WROW</div>
                <div class="filter-box" data-value="Baseball">BSB</div>
                <div class="filter-box" data-value="Softball">SB</div>
              </div>
        </div>

        <div class="filter-section">
            <div class="filter-title">Location</div>
            <div class="history-location-section location-options">
                <div class="history-location-box" data-value="Home">Home</div>
                <div class="history-location-box" data-value="Away">Away</div>
            </div>
        </div>

        <div class = "filter-section">
            <div class = "filter-title">Month</div>
            <div class = "history-month-section month-options">
                <div class = "history-month-box" data-value="01">January</div>
                <div class = "history-month-box" data-value="02">February</div>
                <div class = "history-month-box" data-value="03">March</div>
                <div class = "history-month-box" data-value="04">April</div>
                <div class = "history-month-box" data-value="05">May</div>
                <div class = "history-month-box" data-value="06">June</div>
                <div class = "history-month-box" data-value="07">July</div>
                <div class = "history-month-box" data-value="08">August</div>
                <div class = "history-month-box" data-value="09">September</div>
                <div class = "history-month-box" data-value="10">October</div>
                <div class = "history-month-box" data-value="11">November</div>
                <div class = "history-month-box" data-value="12">December</div>
            </div>
        </div>
    </div>
</template>

<div id="assign-modal" class="modal">
    <div class="assign-modal-content">
        <div class = "modal-header">
            <h2>Assign Writer</h2>
            <span class="close-btn">&times;</span>
        </div>
        <select id="writer-select">
            <option value="">Select a writer</option>
        </select>

        <button id="confirm-assign">Assign</button>
    </div>
</div>

<div id="add-modal" class="modal">
    <div class="add-modal-content">
        <div class = "modal-header">
            <h2>Add Game</h2>
            <span class="close-btn">&times;</span>
        </div>
        <select id="sport-input" class = "add-box">
            <option value="">Select a sport</option>
        </select>  
        <input type="text" id="opponent-input" class = "add-box" placeholder="Opponent">
        <input type="text" id="location-input" class = "add-box" placeholder="Location">
        <input type="date" id="date-input" class = "add-box">
        <input type="time" id="time-input" class = "add-box">
        <input type="text" id="notes-input" class = "add-box" placeholder="Notes">
        <button id="confirm-add" class = "confirm-add">Add Game</button>
    </div>
</div>

<div id="edit-modal" class="modal">
    <div class="edit-modal-content">
        <div class = "modal-header">
            <h2>Edit Game</h2>
            <span class="close-btn">&times;</span>
        </div>
        <select id="edit-sport-input" class = "edit-box">
            <option value="">Select a sport</option>
        </select>  
        <input type="text" id="edit-opponent-input" class = "edit-box" placeholder="Opponent">
        <input type="text" id="edit-location-input" class = "edit-box" placeholder="Location">
        <input type="date" id="edit-date-input" class = "edit-box">
        <input type="time" id="edit-time-input" class = "edit-box">
        <input type="text" id="edit-notes-input" class = "edit-box" placeholder="Notes">
        <button id = "confirm-edit" class = "confirm-edit">Edit Game</button>
        <button id ="delete-game" class = "delete-button">Delete Game</button>
    </div>
</div>

<div id="invoice-modal" class= "modal">
    <div class="add-invoice-modal-content">
        <div class = "modal-header">
            <h2>Add Invoice</h2>
            <span class="close-button">&times;</span>
    </div>
        <input type = "date" id="invoice-date-input" class = "add-invoice-box" placeholder="Date">
        <input type = "number" id="invoice-total-input" class = "add-invoice-box" placeholder="Total Amount">
        <input type = "text" id="invoice-link-input" class = "add-invoice-box" placeholder="Link to Invoice (Optional)">

        <button id="confirm-invoice" class = "add-invoice-confirm">Add Invoice</button>
    </div>
</div>


</body>
