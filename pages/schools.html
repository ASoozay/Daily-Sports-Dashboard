<!DOCTYPE html>
<html lang="en">
<title> Dashboard - The Daily Sports</title>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/css/schools.css">
<link rel="icon" type="image/x-icon" href="./images/favicon.ico?v=2">

<meta charset="UTF-8">

<body>

                <div class = "conference-option">WCC</div>
                <div class = "conference-option">WAC</div>

        </div>

            <div class = "conference-section-header">Independent</div>
            <div class = "conference-independent-options-container">
                <div class = "conference-option">Independent</div>
